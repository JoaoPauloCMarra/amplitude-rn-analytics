# Creates jira tickets for new github issues to help triage
name: Jira Issue Creator For TS

on:
  issues:
    types: [opened]
  workflow_call:
    inputs:
      label:
        type: string

jobs:
  call-workflow-passing-data:
    uses: amplitude/Amplitude-TypeScript/.github/workflows/jira-issue-create-template.yml@b95e10eec61c766ff8fa8797bf4906418f10f1f9f # main pinned 2026-05-12
    with:
      label: "TS"
      subcomponent: "dx_typescript_browser_sdk"
    secrets:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT: ${{ secrets.JIRA_PROJECT }}
