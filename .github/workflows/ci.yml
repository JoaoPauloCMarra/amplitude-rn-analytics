name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  react-native:
    name: React Native package
    runs-on: ubuntu-latest
    env:
      BUN_VERSION: 1.3.14
      PACKAGE_DIR: packages/analytics-react-native
    steps:
      - name: Checkout
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_REF"
          git checkout --detach FETCH_HEAD

      - name: Install Bun
        run: |
          curl -fsSL -o bun-linux-x64.zip "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
          unzip -q bun-linux-x64.zip
          echo "$PWD/bun-linux-x64" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build workspace dependencies
        run: |
          cd packages/analytics-types
          bun run build
          cd ../analytics-core
          bun run build

      - name: Typecheck
        working-directory: ${{ env.PACKAGE_DIR }}
        run: bun run typecheck

      - name: Lint
        working-directory: ${{ env.PACKAGE_DIR }}
        run: bun run lint

      - name: Test web
        working-directory: ${{ env.PACKAGE_DIR }}
        run: bun run test:web

      - name: Test mobile
        working-directory: ${{ env.PACKAGE_DIR }}
        run: bun run test:mobile

      - name: Build
        working-directory: ${{ env.PACKAGE_DIR }}
        run: bun run build
