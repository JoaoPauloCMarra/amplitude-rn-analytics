name: Publish npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      releaseTag:
        description: Release tag to validate, for example v1.5.58
        required: true
      prerelease:
        description: Publish with the next dist-tag instead of latest
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish amplitude-rn-analytics
    runs-on: ubuntu-latest
    env:
      EXPECTED_PACKAGE_NAME: amplitude-rn-analytics
      PACKAGE_DIR: packages/analytics-react-native
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.releaseTag }}
      RELEASE_PRERELEASE: ${{ github.event.release.prerelease || inputs.prerelease }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.26.1 --activate

      - name: Verify npm trusted publishing toolchain
        run: |
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) throw new Error('Node 22.14.0 or newer is required for npm trusted publishing')"
          npm --version
          node -e "const npmVersion = require('child_process').execFileSync('npm', ['--version'], { encoding: 'utf8' }).trim().split('.').map(Number); if (npmVersion[0] < 11 || (npmVersion[0] === 11 && npmVersion[1] < 5)) throw new Error('npm 11.5.1 or newer is required for trusted publishing')"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release version
        working-directory: ${{ env.PACKAGE_DIR }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_VERSION="${RELEASE_TAG#v}"

          if [ "$PACKAGE_NAME" != "$EXPECTED_PACKAGE_NAME" ]; then
            echo "Refusing to publish $PACKAGE_NAME from $PACKAGE_DIR; expected $EXPECTED_PACKAGE_NAME"
            exit 1
          fi

          if [ "$RELEASE_TAG" != "v$RELEASE_VERSION" ]; then
            echo "Release tag must use v<version> format. Received: $RELEASE_TAG"
            exit 1
          fi

          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Release tag v$RELEASE_VERSION does not match $PACKAGE_NAME@$PACKAGE_VERSION"
            exit 1
          fi

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published"
            exit 1
          fi

      - name: Select npm dist-tag
        run: |
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            echo "NPM_DIST_TAG=next" >> "$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Verify package
        working-directory: ${{ env.PACKAGE_DIR }}
        run: |
          npm run typecheck
          npm run lint
          npm run test:web
          npm run test:mobile
          npm run build

      - name: Pack dry run
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm publish --access public --tag "$NPM_DIST_TAG" --dry-run

      - name: Publish package with npm trusted publishing
        if: ${{ github.event_name == 'release' }}
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm publish --access public --tag "$NPM_DIST_TAG"

      - name: Manual dry-run summary
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "Manual workflow_dispatch is dry-run only."
          echo "Create GitHub Release $RELEASE_TAG to publish with dist-tag $NPM_DIST_TAG."
