name: Publish npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      releaseTag:
        description: Release tag to validate, for example v1.5.58
        required: true
      prerelease:
        description: Publish with the next dist-tag instead of latest
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish amplitude-rn-analytics
    runs-on: ubuntu-latest
    env:
      BUN_VERSION: 1.3.14
      EXPECTED_PACKAGE_NAME: amplitude-rn-analytics
      PACKAGE_DIR: packages/analytics-react-native
    steps:
      - name: Checkout release tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node <<'NODE' > /tmp/checkout-ref
          const event = require(process.env.GITHUB_EVENT_PATH);
          if (process.env.GITHUB_EVENT_NAME === 'release') {
            console.log(`refs/tags/${event.release.tag_name}`);
          } else {
            console.log(process.env.GITHUB_REF);
          }
          NODE
          CHECKOUT_REF=$(cat /tmp/checkout-ref)
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$CHECKOUT_REF"
          git checkout --detach FETCH_HEAD

      - name: Resolve release inputs
        run: |
          node <<'NODE' >> "$GITHUB_ENV"
          const event = require(process.env.GITHUB_EVENT_PATH);
          if (process.env.GITHUB_EVENT_NAME === 'release') {
            console.log(`RELEASE_TAG=${event.release.tag_name}`);
            console.log(`RELEASE_PRERELEASE=${String(event.release.prerelease)}`);
          } else {
            console.log(`RELEASE_TAG=${event.inputs.releaseTag}`);
            console.log(`RELEASE_PRERELEASE=${event.inputs.prerelease}`);
          }
          NODE

      - name: Install Node 24
        run: |
          NODE_ARCHIVE=$(curl -fsSL https://nodejs.org/dist/latest-v24.x/SHASUMS256.txt | awk '/linux-x64.tar.xz$/ {print $2; exit}')
          curl -fsSLO "https://nodejs.org/dist/latest-v24.x/${NODE_ARCHIVE}"
          tar -xJf "$NODE_ARCHIVE"
          echo "$PWD/${NODE_ARCHIVE%.tar.xz}/bin" >> "$GITHUB_PATH"

      - name: Configure npm registry
        run: |
          npm config set registry https://registry.npmjs.org

      - name: Verify npm trusted publishing toolchain
        run: |
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) throw new Error('Node 22.14.0 or newer is required for npm trusted publishing')"
          npm --version
          node -e "const npmVersion = require('child_process').execFileSync('npm', ['--version'], { encoding: 'utf8' }).trim().split('.').map(Number); if (npmVersion[0] < 11 || (npmVersion[0] === 11 && npmVersion[1] < 5)) throw new Error('npm 11.5.1 or newer is required for trusted publishing')"

      - name: Install Bun
        run: |
          curl -fsSL -o bun-linux-x64.zip "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
          unzip -q bun-linux-x64.zip
          echo "$PWD/bun-linux-x64" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build workspace dependencies
        run: |
          cd packages/analytics-types
          bun run build
          cd ../analytics-core
          bun run build

      - name: Validate release version
        working-directory: ${{ env.PACKAGE_DIR }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_VERSION="${RELEASE_TAG#v}"

          if [ "$PACKAGE_NAME" != "$EXPECTED_PACKAGE_NAME" ]; then
            echo "Refusing to publish $PACKAGE_NAME from $PACKAGE_DIR; expected $EXPECTED_PACKAGE_NAME"
            exit 1
          fi

          if [ "$RELEASE_TAG" != "v$RELEASE_VERSION" ]; then
            echo "Release tag must use v<version> format. Received: $RELEASE_TAG"
            exit 1
          fi

          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Release tag v$RELEASE_VERSION does not match $PACKAGE_NAME@$PACKAGE_VERSION"
            exit 1
          fi

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published"
            exit 1
          fi

      - name: Select npm dist-tag
        run: |
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            echo "NPM_DIST_TAG=next" >> "$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Verify package
        working-directory: ${{ env.PACKAGE_DIR }}
        run: |
          bun run typecheck
          bun run lint
          bun run test:web
          bun run test:mobile
          bun run build

      - name: Pack dry run
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm publish --access public --tag "$NPM_DIST_TAG" --dry-run

      - name: Publish package with npm trusted publishing
        if: ${{ github.event_name == 'release' }}
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm publish --access public --tag "$NPM_DIST_TAG"

      - name: Manual dry-run summary
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "Manual workflow_dispatch is dry-run only."
          echo "Create GitHub Release $RELEASE_TAG to publish with dist-tag $NPM_DIST_TAG."
